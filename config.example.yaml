server:
  port: 62201           # UDP port to listen on
  interface: "0.0.0.0"  # Bind address
  max_age_sec: 10       # Max allowed packet age (replay attack window)

router:
  ip: "172.17.0.1"      # MikroTik router IP reachable from the container
  user: "spa-api"       # RouterOS API user (REST API)
  password: "your_password"

firewall:
  list_name: "SPA_Auth"     # Address list name in RouterOS
  open_timeout: "00:05:00"  # How long the IP stays in the list (HH:MM:SS)